<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body {
        width: 340px;
        margin: 0;
        padding: 14px;
        font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: #0f766e;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      button.secondary {
        margin-top: 8px;
        border: 1px solid #d1d5db;
        background: #f9fafb;
        color: #111827;
      }
      .buttons button.secondary {
        margin-top: 0;
      }
      textarea {
        width: 100%;
        min-height: 220px;
        box-sizing: border-box;
        margin-top: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 10px;
        resize: vertical;
        font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #status {
        margin: 10px 0 0;
        color: #4b5563;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="buttons">
      <button id="start">Kayda başla</button>
      <button id="stop" class="secondary">Durdur + kopyala</button>
    </div>
    <button id="capture" class="secondary">Şimdi görüneni kopyala</button>
    <button id="clear" class="secondary">Kaydı temizle</button>
    <p id="status">Dreaming video sayfasında altyazıyı aç, kayda başla, video oynarken altyazılar biriksin.</p>
    <textarea id="output" placeholder="Yakalanan transcript burada görünür."></textarea>
    <script src="popup.js"></script>
  </body>
</html>
